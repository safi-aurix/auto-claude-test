name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write    # ← change from read to write (so reviewer can post comments)
      issues: write           # ← add this (so reviewer can create QA ticket)
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'    # ← THIS is the fix — allows Claude's PRs to trigger review
          prompt: |
            You are a senior code reviewer. Review this pull request thoroughly:

            PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}

            Check for:
            1. Code quality and best practices
            2. Bugs or logic errors
            3. Security issues
            4. Test coverage
            5. Adherence to CLAUDE.md guidelines

            Then do ONE of the following:
            - If the code looks good: Post a review approving the PR, then create a 
              new GitHub Issue with label 'qa-needed' titled 
              "QA: ${{ github.event.pull_request.title }}" describing what to test.
            - If changes are needed: Request changes on the PR with detailed comments
              explaining exactly what to fix.
