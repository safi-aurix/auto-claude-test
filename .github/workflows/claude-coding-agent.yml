name: Coding Agent
on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'auto-code'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read this GitHub issue and implement the requested feature.
            Create a new branch, write the code, write tests, then open a PR.
            Follow the guidelines in CLAUDE.md.
