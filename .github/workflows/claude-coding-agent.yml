name: Coding Agent
on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'auto-code'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools Bash(git:*),Bash(gh pr:*),Bash(gh issue:*)'
          prompt: |
            You are a coding agent. A GitHub issue has been submitted:

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            Description:
            ${{ github.event.issue.body }}

            Your task:
            1. Create a new git branch: feature/issue-${{ github.event.issue.number }}
            2. Implement the requested feature
            3. Write appropriate tests
            4. Commit all changes with a clear message
            5. Open a pull request to main describing what was implemented
            6. Follow all guidelines in CLAUDE.mdname: Coding Agent
on:
  issues:
