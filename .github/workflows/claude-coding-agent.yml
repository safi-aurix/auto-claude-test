name: Coding Agent
on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'auto-code'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write        # ← this was missing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1     # matches your other workflows
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read this GitHub issue and implement the requested feature.
            Create a new branch, write the code, write tests, then open a PR.
            Follow the guidelines in CLAUDE.md.
